<style>
  :root{
    --paper:#F4F5F2; --ink:#14181B; --soft:#565E63; --line:#DCDED8;
    --blue:#20438F; --blue-wash:#E9EEF7;
    --amber:#B7741E; --amber-wash:#F6EEDF;
    --up:#1E7A5A; --down:#B23A48; --flat:#7A7F84;
    --card:#FBFBF9;
    --maxw:1180px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:"Newsreader",Georgia,serif; font-size:18px; line-height:1.5;
    font-optical-sizing:auto;
  }
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace}
  a{color:var(--blue); text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 22px}

  /* ---- Masthead ---- */
  header.mast{border-bottom:2px solid var(--ink); padding-top:26px}
  .mast-top{display:flex; justify-content:space-between; align-items:baseline; gap:16px; flex-wrap:wrap}
  .brand{font-family:"Archivo",sans-serif; font-weight:800; letter-spacing:.14em;
    font-size:clamp(30px,5.5vw,52px); line-height:.95; margin:0; text-transform:uppercase}
  .brand span{color:var(--blue)}
  .tagline{font-family:"JetBrains Mono",monospace; font-size:11.5px; letter-spacing:.06em;
    color:var(--soft); text-transform:uppercase; margin:6px 0 14px}
  .dateline{font-family:"JetBrains Mono",monospace; font-size:12px; color:var(--soft);
    text-align:right; line-height:1.7; white-space:nowrap}
  .dateline b{color:var(--ink)}
  .mast-rule{display:flex; gap:22px; align-items:center; border-top:1px solid var(--line);
    padding:8px 0 10px; font-family:"JetBrains Mono",monospace; font-size:11px;
    letter-spacing:.05em; color:var(--soft); text-transform:uppercase; flex-wrap:wrap}
  .mast-rule .dot{width:6px;height:6px;border-radius:50%;background:var(--amber);display:inline-block;margin-right:6px;vertical-align:middle}

  /* ---- Thesis ---- */
  .thesis{padding:30px 0 8px; max-width:900px}
  .thesis .eyebrow{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--amber);margin-bottom:12px}
  .thesis h2{font-family:"Newsreader",serif; font-weight:500; font-size:clamp(22px,3.4vw,34px);
    line-height:1.28; margin:0; letter-spacing:-.01em}

  /* ---- Connection (signature) ---- */
  .cross{margin:30px 0 8px; border:1.5px solid var(--ink); background:var(--card);
    position:relative; overflow:hidden}
  .cross-head{display:flex;align-items:center;gap:10px;padding:12px 20px;
    border-bottom:1px solid var(--line); background:var(--ink); color:var(--paper)}
  .cross-head .k{font-family:"Archivo",sans-serif;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;font-size:13px}
  .cross-head .sub{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.05em;
    color:#B9C0C6;text-transform:uppercase;margin-left:auto}
  .cross-body{display:grid; grid-template-columns:1fr auto 1fr; gap:0; align-items:stretch}
  .cross-node{padding:18px 20px}
  .cross-node .tag{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.1em;
    text-transform:uppercase;margin-bottom:8px}
  .cross-node.ai .tag{color:var(--blue)}
  .cross-node.mkt .tag{color:var(--amber)}
  .cross-node h4{margin:0 0 4px; font-family:"Newsreader",serif; font-weight:600; font-size:19px; line-height:1.25}
  .cross-node p{margin:0; font-size:15px; color:var(--soft); line-height:1.45}
  .cross-link{width:64px; position:relative; border-left:1px dashed var(--line); border-right:1px dashed var(--line)}
  .cross-link::before{content:"×"; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:"Archivo",sans-serif; font-weight:800; font-size:26px; color:var(--amber);
    background:var(--card); width:40px; height:40px; border:1.5px solid var(--ink); border-radius:50%;
    display:flex; align-items:center; justify-content:center; line-height:1}
  .cross-synth{padding:16px 20px 20px; border-top:1px solid var(--line); font-size:16px; line-height:1.55}
  .cross-synth b{font-weight:600}

  /* ---- Section grid ---- */
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:0 40px; margin-top:34px;
    border-top:2px solid var(--ink)}
  .col{padding-top:16px}
  .col + .col{border-left:1px solid var(--line); padding-left:40px}
  .col-head{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
  .col-head h3{font-family:"Archivo",sans-serif;font-weight:700;text-transform:uppercase;
    letter-spacing:.08em;font-size:15px;margin:0}
  .col-head .cnt{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--soft)}
  .col.ai .col-head h3{color:var(--blue)}
  .col.mkt .col-head h3{color:var(--amber)}

  .item{padding:16px 0; border-top:1px solid var(--line)}
  .item:first-of-type{border-top:none}
  .item-top{display:flex; gap:8px; align-items:flex-start; margin-bottom:5px}
  .sig{font-family:"JetBrains Mono",monospace;font-size:9.5px;font-weight:700;letter-spacing:.03em;
    padding:2px 5px; border:1px solid var(--line); color:var(--soft); border-radius:2px;
    flex-shrink:0; margin-top:3px}
  .sig.hi{color:var(--amber); border-color:var(--amber); background:var(--amber-wash)}
  .item h4{margin:0; font-family:"Newsreader",serif; font-weight:600; font-size:19px; line-height:1.28}
  .item h4 a{color:var(--ink)}
  .item h4 a:hover{color:var(--blue)}
  .item .sum{margin:6px 0 8px; font-size:15.5px; color:#33393E; line-height:1.5}
  .item .why{font-size:13.5px; color:var(--soft); font-style:italic; margin:0 0 9px;
    padding-left:10px; border-left:2px solid var(--amber-wash)}
  .meta{display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    font-family:"JetBrains Mono",monospace; font-size:11px; color:var(--soft)}
  .tagchip{background:var(--blue-wash); color:var(--blue); padding:1px 6px; border-radius:2px; letter-spacing:.02em}
  .col.mkt .tagchip{background:var(--amber-wash); color:var(--amber)}
  .dir{font-weight:700; padding:1px 6px; border-radius:2px}
  .dir.up{color:var(--up)} .dir.down{color:var(--down)} .dir.flat{color:var(--flat)}
  .src{margin-left:auto}
  .lock{opacity:.7}

  /* ---- Momentum ---- */
  .momentum{margin:44px 0 0; border-top:2px solid var(--ink); padding-top:16px}
  .momentum h3{font-family:"Archivo",sans-serif;font-weight:700;text-transform:uppercase;
    letter-spacing:.08em;font-size:15px;margin:0 0 4px}
  .momentum .lead{font-size:14px;color:var(--soft);margin:0 0 16px}
  .mo-grid{display:flex; flex-wrap:wrap; gap:10px}
  .mo{border:1px solid var(--line); background:var(--card); padding:9px 12px; min-width:150px; flex:1 1 160px; max-width:220px}
  .mo .name{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:13px; display:flex; justify-content:space-between; align-items:center}
  .mo .name .d{font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:1px 4px;border-radius:2px}
  .mo .name .d.ai{background:var(--blue-wash);color:var(--blue)}
  .mo .name .d.finance{background:var(--amber-wash);color:var(--amber)}
  .mo .name .d.cross{background:var(--ink);color:var(--paper)}
  .mo .bar{height:5px; background:var(--line); margin:8px 0 6px; border-radius:3px; overflow:hidden}
  .mo .bar i{display:block; height:100%; background:var(--blue)}
  .mo.cross .bar i{background:var(--ink)} .mo.finance .bar i{background:var(--amber)}
  .mo .foot{font-family:"JetBrains Mono",monospace; font-size:10.5px; color:var(--soft)}
  .mo .streak{color:var(--amber); font-weight:700}

  /* ---- Archive + footer ---- */
  .archive{margin:44px 0 0; border-top:1px solid var(--line); padding-top:18px;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap}
  .archive label{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--soft)}
  select#arc{font-family:"JetBrains Mono",monospace; font-size:13px; padding:7px 10px;
    border:1px solid var(--ink); background:var(--card); color:var(--ink); border-radius:2px}
  .archive .badge{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--soft)}

  footer{margin-top:40px; border-top:2px solid var(--ink); padding:16px 0 60px;
    font-family:"JetBrains Mono",monospace; font-size:11px; color:var(--soft); line-height:1.8}
  footer b{color:var(--ink)}
  footer .row{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap}

  /* ---- responsive ---- */
  @media (max-width:760px){
    body{font-size:17px}
    .grid{grid-template-columns:1fr; gap:0}
    .col + .col{border-left:none; border-top:1px solid var(--ink); padding-left:0; margin-top:20px; padding-top:16px}
    .cross-body{grid-template-columns:1fr}
    .cross-link{width:auto; height:44px; border-left:none; border-right:none;
      border-top:1px dashed var(--line); border-bottom:1px dashed var(--line)}
    .dateline{text-align:left}
  }
  @media (prefers-reduced-motion:no-preference){
    .item, .mo, .cross{animation:rise .5s ease both}
    @keyframes rise{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none}}
  }
  :focus-visible{outline:2px solid var(--blue); outline-offset:2px}
</style>
</head>

<script>
const DIR = {up:"▲", down:"▼", flat:"■"};
const esc = s => (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

async function loadJSON(path, fbKey){
  try{
    const r = await fetch(path, {cache:"no-store"});
    if(!r.ok) throw 0;
    return await r.json();
  }catch(e){
    const fb = JSON.parse(document.getElementById("fallback").textContent);
    return fbKey.split(".").reduce((o,k)=>o&&o[k], fb);
  }
}

function fmtDate(iso){
  const d = new Date(iso+"T00:00:00");
  return d.toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
}

function renderMast(ed, ent){
  document.getElementById("dateline").innerHTML =
    `<b>${fmtDate(ed.date)}</b><br>EDITION №${String(ed.edition).padStart(3,"0")} · KST 07:30`;
  const tracked = Object.keys((ent&&ent.entities)||{}).length;
  document.getElementById("mastrule").innerHTML =
    `<span><span class="dot"></span>자동 생성 · 매일 1회</span>`+
    `<span>· 소스 2 (Medium / Investing.com)</span>`+
    `<span>· 추적 엔티티 ${tracked}</span>`+
    `<span>· 오늘 항목 ${ed.sections.reduce((n,s)=>n+s.items.length,0)}</span>`;
}

function renderThesis(ed){
  document.getElementById("thesis").innerHTML =
    `<div class="eyebrow">오늘의 한 줄</div><h2>${esc(ed.thesis)}</h2>`;
}

function findItem(ed, ref){
  for(const s of ed.sections){ const it = s.items.find(i=>i.id===ref); if(it) return {it, s}; }
  return null;
}

function renderCross(ed){
  const c = ed.connection;
  const a = findItem(ed, c.ai_ref), m = findItem(ed, c.market_ref);
  document.getElementById("cross").innerHTML = `
    <div class="cross">
      <div class="cross-head">
        <span class="k">${esc(c.label)}</span>
        <span class="sub">AI × MARKET — 이메일엔 없는 연결</span>
      </div>
      <div class="cross-body">
        <div class="cross-node ai">
          <div class="tag">AI · 코딩</div>
          <h4>${a?`<a href="${esc(a.it.url)}" target="_blank" rel="noopener">${esc(a.it.title_ko)}</a>`:"—"}</h4>
          <p>${a?esc(a.it.summary_ko):""}</p>
        </div>
        <div class="cross-link" aria-hidden="true"></div>
        <div class="cross-node mkt">
          <div class="tag">마켓 · 금융</div>
          <h4>${m?`<a href="${esc(m.it.url)}" target="_blank" rel="noopener">${esc(m.it.title_ko)}</a>`:"—"}</h4>
          <p>${m?esc(m.it.summary_ko):""}</p>
        </div>
      </div>
      <div class="cross-synth">${esc(c.body)}</div>
    </div>`;
}

function itemHTML(it, mustRef){
  const must = it.id===mustRef;
  const sig = must
    ? `<span class="sig hi" title="오늘 꼭 볼 것">★ MUST</span>`
    : `<span class="sig" title="신호 등급">S${it.signal}</span>`;
  const dir = it.direction
    ? `<span class="dir ${it.direction}">${DIR[it.direction]} ${it.direction.toUpperCase()}</span>` : "";
  const lock = it.access==="member" ? `<span class="lock" title="유료 회원 전용">🔒</span>` : "";
  const tags = (it.tags||[]).slice(0,3).map(t=>`<span class="tagchip">#${esc(t)}</span>`).join(" ");
  return `<article class="item">
    <div class="item-top">${sig}
      <h4><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title_ko)}</a></h4>
    </div>
    <p class="sum">${esc(it.summary_ko)}</p>
    ${it.why?`<p class="why">왜 중요한가 · ${esc(it.why)}</p>`:""}
    <div class="meta">${dir} ${tags}
      <span class="src">${lock} ${esc(it.author||"")} · <a href="${esc(it.url)}" target="_blank" rel="noopener">원문 →</a></span>
    </div>
  </article>`;
}

function renderGrid(ed){
  const mustRef = ed.must_read && ed.must_read.ref;
  const cls = {ai_coding:"ai", finance:"mkt"};
  document.getElementById("grid").innerHTML = ed.sections.map(s=>`
    <div class="col ${cls[s.domain]||""}">
      <div class="col-head"><h3>${esc(s.label)}</h3><span class="cnt">${s.items.length} ITEMS · ${esc(s.source)}</span></div>
      ${s.items.map(it=>itemHTML(it, mustRef)).join("")}
    </div>`).join("");
}

        <div class="mo ${v.domain}">
          <div class="name">${esc(name)}<span class="d ${v.domain}">${v.domain}</span></div>
          <div class="bar"><i style="width:${Math.round(v.count/max*100)}%"></i></div>
          <div class="foot">등장 ${v.count}회 ${v.streak>1?`· <span class="streak">${v.streak}일 연속</span>`:""}</div>
        </div>`).join("")}
    </div>`;
}

let MANIFEST=null;
async function showEdition(date){
  const ed = await loadJSON(`./data/daily/${date}.json`, `daily.${date}`);
  const ent = await loadJSON(`./data/entities.json`, "entities");
  renderMast(ed, ent); renderThesis(ed); renderCross(ed); renderGrid(ed); renderMomentum(ent);
  document.getElementById("arcbadge").textContent =
    date===MANIFEST.latest ? "최신 에디션" : "아카이브 열람 중";
  window.scrollTo({top:0, behavior:"smooth"});
}

async function init(){
  MANIFEST = await loadJSON("./data/manifest.json","manifest");
  const sel = document.getElementById("arc");
  sel.innerHTML = MANIFEST.editions.map(e=>
    `<option value="${e.date}">${e.date} · №${String(e.edition).padStart(3,"0")}</option>`).join("");
  sel.value = MANIFEST.latest;
  sel.addEventListener("change", ()=>showEdition(sel.value));
  await showEdition(MANIFEST.latest);
}
init();
</script>
